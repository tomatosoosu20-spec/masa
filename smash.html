<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Pixel Smash | Game Park</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="smash.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <a href="index.html" class="back-link">← Portfolio</a>
            <div class="game-title">SUPER PIXEL SMASH</div>
            <div id="controls-hint">Controls: Arrow Keys + Space/Z (Attack/Spec)</div>
        </header>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas"></canvas>
            
            <!-- HUD for 8 Players -->
            <div id="hud" class="grid-hud">
                <!-- Players will be generated by JS -->
            </div>

            <!-- Overlays -->
            <div id="intro-overlay" class="overlay hidden">
                <div class="intro-text" id="intro-text">READY?</div>
            </div>

            <!-- Character Select Screen -->
            <div id="char-select-screen" class="overlay">
                <div class="overlay-content select-content">
                    <h1>SELECT CHARACTERS</h1>
                    <div class="char-grid" id="char-grid">
                        <!-- 8 Slots will be here -->
                    </div>
                    <div class="settings-bar">
                        <label for="stock-select">STOCKS:</label>
                        <input type="number" id="stock-select" value="3" min="1" max="99">
                    </div>
                    <div class="overlay-actions">
                        <button id="start-battle-btn" class="pixel-btn primary">BATTLE START</button>
                    </div>
                </div>
            </div>

            <div id="start-screen" class="overlay">
                <div class="overlay-content">
                    <h1>SUPER PIXEL SMASH</h1>
                    <p>Knock them off the stage!</p>
                    <button id="startBtn" class="pixel-btn">FIGHT!</button>
                </div>
            </div>

            <div id="gameover-screen" class="overlay hidden">
                <div class="overlay-content">
                    <h1 id="winner-text">P1 WINS!</h1>
                    <button id="retryBtn" class="pixel-btn">REMATCH</button>
                    <a href="index.html" class="pixel-btn outline">EXIT</a>
                </div>
            </div>
        </div>
    </div>

    <script src="smash.js"></script>
</body>
</html>
