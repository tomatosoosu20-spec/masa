<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Quest | 2D Dot Adventure</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dot_game.css">
</head>
<body>
    <div id="game-ui">
        <div class="stat">SCORE: <span id="score">0</span></div>
        <div class="stat">GEMS: <span id="gems">0/10</span></div>
        <div class="stat">LEVEL: <span id="level">1</span></div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="overlay" class="hidden">
        <div id="status-msg">GAME OVER</div>
        <button id="restartBtn">RESTART</button>
        <button id="menuBtn">MENU</button>
    </div>

    <div id="start-screen">
        <h1>PIXEL QUEST</h1>
        <p>Collect all gems and reach the goal!</p>
        <p>Avoid the purple slimes.</p>
        <button id="startBtn">START GAME</button>
    </div>

    <script src="dot_game.js"></script>
</body>
</html>
