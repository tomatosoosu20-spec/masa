<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スーパーマリオパクリ | masato</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="mario.css">
</head>

<body>
    <div class="sky-background"></div>

    <div class="game-container">
        <header>
            <a href="index.html" class="back-link">← ポートフォリオに戻る</a>
            <h1>スーパーマリオパクリ</h1>
        </header>

        <div class="score-board">
            Score: <span id="score">0</span> | HP: <span id="hp">3</span>
            <button id="noSpikesBtn" class="btn btn-sm" style="margin-left: 10px;">針なしモード: OFF</button>
        </div>

        <canvas id="gameCanvas" width="800" height="450"></canvas>

        <p class="instruction">矢印キーで移動・ジャンプ　3回ジャンプ押すことで、3段ジャンプ　　敵を踏んだりコインを集めたりしよう！</p>
        <button id="restartBtn" class="btn hidden">もう一度遊ぶ</button>
    </div>

    <script src="mario.js"></script>
</body>

</html>
